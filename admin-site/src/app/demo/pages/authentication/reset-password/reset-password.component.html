<div class="auth-wrapper">
  <div class="auth-content">
    <div class="card">
      <div class="row align-items-center text-center">
        <div class="col-md-12">
          <div class="card-body">
            <form (ngSubmit)="submit($event)">
              <img src="assets/images/logo_signin.jpg" alt="logo" class="img-fluid mb-4" width="260" />
              <h4 class="mb-3 f-w-400">Đặt lại mật khẩu</h4>

              <div class="input-group mb-3">
                <input
                  type="password"
                  class="form-control"
                  [(ngModel)]="newPassword"
                  name="newPassword"
                  placeholder="Mật khẩu mới"
                />
              </div>
              <div class="input-group mb-3">
                <input
                  type="password"
                  class="form-control"
                  [(ngModel)]="confirmPassword"
                  name="confirmPassword"
                  placeholder="Xác nhận mật khẩu mới"
                />
              </div>

              @if (error()) {
                <div class="alert alert-danger mb-3">{{ error() }}</div>
              }
              @if (message()) {
                <div class="alert alert-success mb-3">{{ message() }}</div>
              }

              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-block mb-3" [disabled]="loading()">
                  {{ loading() ? 'Đang xử lý...' : 'Cập nhật mật khẩu' }}
                </button>
              </div>
            </form>
            <p class="mb-0">
              <a [routerLink]="['/login']" class="f-w-400">Quay lại đăng nhập</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
