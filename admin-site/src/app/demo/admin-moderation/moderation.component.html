<div class="row">
  <div class="col-xl-12">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Danh sách bài đăng chờ duyệt</h5>
      <div class="d-flex align-items-center">
        <input
          type="text"
          class="form-control form-control-sm me-2"
          placeholder="Tìm theo ID hoặc tiêu đề..."
          [(ngModel)]="searchTerm"
        />
        <!-- <button
          type="button"
          class="btn btn-primary btn-sm"
          (click)="loadPending()"
          [disabled]="loading"
        >
          Tải lại
        </button> -->
      </div>
    </div>
    <app-card blockClass="table-border-style">
      <div class="table-responsive">
        <table class="table table-striped table-hover" *ngIf="!loading">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tiêu đề</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of filteredItems">
              <td>{{ item.id || item._id }}</td>
              <td>{{ item.title }}</td>
              <td>
                <app-status-badge [status]="item.status || 'DRAFT'"></app-status-badge>
              </td>
              <td>
                <button
                  class="btn btn-success btn-sm me-1"
                  (click)="approve(item)"
                  [disabled]="loading || item.isUpdating || item.status !== 'PENDING_ADMIN'"
                >
                  <span
                    *ngIf="item.isUpdating"
                    class="spinner-border spinner-border-sm me-1"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  Duyệt
                </button>
                <button
                  class="btn btn-danger btn-sm me-1"
                  (click)="reject(item)"
                  [disabled]="loading || item.isUpdating || item.status !== 'PENDING_ADMIN'"
                >
                  Từ chối
                </button>
                <button
                  class="btn btn-warning btn-sm"
                  (click)="requestUpdate(item)"
                  [disabled]="loading || item.isUpdating || item.status !== 'PENDING_ADMIN'"
                >
                  Yêu cầu cập nhật
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <div *ngIf="loading" class="text-center p-3">
          <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
          Đang tải...
        </div>
        <div *ngIf="!loading && filteredItems.length === 0" class="text-center p-3 text-muted">
          Không có bài đăng nào chờ duyệt.
        </div>
      </div>
    </app-card>
  </div>
</div>
<!-- Reason modal: backdrop click không đóng, bắt buộc Hủy hoặc nhập lý do + Xác nhận -->
<div
  *ngIf="showReasonModal"
  class="modal d-block"
  tabindex="-1"
  role="dialog"
  aria-modal="true"
  aria-labelledby="reasonModalTitle"
  aria-describedby="reasonModalDesc"
  style="background: rgba(0,0,0,0.5);"
  (keydown.escape)="cancelReasonModal()"
>
  <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="reasonModalTitle">Nhập lý do</h5>
        <button type="button" class="btn-close" aria-label="Đóng" (click)="cancelReasonModal()"></button>
      </div>
      <div class="modal-body">
        <p id="reasonModalDesc">Vui lòng nhập lý do cho hành động này (bắt buộc):</p>
        <textarea
          class="form-control"
          rows="4"
          [(ngModel)]="modalReason"
          placeholder="Nhập lý do..."
          #reasonInput
          (keydown.escape)="$event.preventDefault(); cancelReasonModal()"
        ></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancelReasonModal()">Hủy</button>
        <button type="button" class="btn btn-primary" (click)="confirmReasonModal()" [disabled]="!(modalReason && modalReason.trim())">Xác nhận</button>
      </div>
    </div>
  </div>
</div>
