<div class="row">
  <div class="col-xl-12">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Moderation - Pending Admin Items</h5>
      <div class="d-flex align-items-center">
        <input
          type="text"
          class="form-control form-control-sm me-2"
          placeholder="Tìm theo ID hoặc tiêu đề..."
          [(ngModel)]="searchTerm"
        />
        <button
          class="btn btn-primary btn-sm"
          (click)="loadPending()"
          [disabled]="loading"
        >
          Reload
        </button>
      </div>
    </div>
    <app-card blockClass="table-border-style">
      <div class="table-responsive">
        <table class="table table-striped table-hover" *ngIf="!loading">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of filteredItems">
              <td>{{ item.id || item._id }}</td>
              <td>{{ item.title }}</td>
              <td>
                <app-status-badge [status]="item.status || 'DRAFT'"></app-status-badge>
              </td>
              <td>
                <button
                  class="btn btn-success btn-sm me-1"
                  (click)="approve(item)"
                  [disabled]="loading || item.isUpdating || item.status !== 'PENDING_ADMIN'"
                >
                  <span
                    *ngIf="item.isUpdating"
                    class="spinner-border spinner-border-sm me-1"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  APPROVED
                </button>
                <button
                  class="btn btn-danger btn-sm me-1"
                  (click)="reject(item)"
                  [disabled]="loading || item.isUpdating || item.status !== 'PENDING_ADMIN'"
                >
                  REJECTED
                </button>
                <button
                  class="btn btn-warning btn-sm"
                  (click)="requestUpdate(item)"
                  [disabled]="loading || item.isUpdating || item.status !== 'PENDING_ADMIN'"
                >
                  NEEDS UPDATE
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <div *ngIf="loading" class="text-center p-3">
          Loading...
        </div>
        <div *ngIf="!loading && filteredItems.length === 0" class="text-center p-3">
          No pending items found.
        </div>
      </div>
    </app-card>
  </div>
</div>

<!-- Reason modal -->
<div *ngIf="showReasonModal" class="modal d-block" tabindex="-1" role="dialog" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nhập lý do</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="cancelReasonModal()"></button>
      </div>
      <div class="modal-body">
        <p>Vui lòng nhập lý do cho hành động này (bắt buộc):</p>
        <textarea class="form-control" rows="4" [(ngModel)]="modalReason"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancelReasonModal()">Hủy</button>
        <button type="button" class="btn btn-primary" (click)="confirmReasonModal()" [disabled]="!(modalReason && modalReason.trim())">Xác nhận</button>
      </div>
    </div>
  </div>
</div>
