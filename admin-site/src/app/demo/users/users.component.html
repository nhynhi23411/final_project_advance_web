<div class="row">
  <div class="col-xl-12">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Quản lý Người Dùng</h5>
      <div class="d-flex align-items-center">
        <input
          type="text"
          class="form-control form-control-sm me-2"
          placeholder="Tìm theo tên, email, username..."
          [(ngModel)]="searchTerm"
        />
        <!-- <button
          type="button"
          class="btn btn-primary btn-sm"
          (click)="loadUsers()"
          [disabled]="loading"
        >
          Tải lại
        </button> -->
      </div>
    </div>
    <app-card blockClass="table-border-style">
      <div class="table-responsive">
        <table class="table table-striped table-hover" *ngIf="!loading">
          <thead>
            <tr>
              <th>Username</th>
              <th>Họ tên</th>
              <th>Email</th>
              <th>Điện thoại</th>
              <th>Vai trò</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let u of filteredUsers">
              <td>{{ u.username }}</td>
              <td>{{ u.name }}</td>
              <td>{{ u.email }}</td>
              <td>{{ u.phone || '-' }}</td>
              <td>{{ getRoleLabel(u.role) }}</td>
              <td>
                <span [ngClass]="getStatusBadgeClass(u.status)">{{ u.status || 'ACTIVE' }}</span>
              </td>
            </tr>
          </tbody>
        </table>
        <div *ngIf="loading" class="text-center p-3">
          <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
          Đang tải...
        </div>
        <div *ngIf="!loading && filteredUsers.length === 0" class="text-center p-3 text-muted">
          Không có người dùng nào.
        </div>
      </div>
    </app-card>
  </div>
</div>
