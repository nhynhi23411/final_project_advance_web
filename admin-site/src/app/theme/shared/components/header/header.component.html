<nav class="navbar pcoded-header navbar-expand-lg navbar-light">
  <div class="container-fluid">
    <!-- Logo Section -->
    <a class="app-brand" [routerLink]="['/analytics']">
      <img src="assets/images/logo_signin.jpg" alt="Lost and Found" class="brand-image" />
    </a>

    <!-- Header Navigation -->
    <nav class="header-nav" aria-label="Main navigation">
      <a
        class="header-nav-item"
        [routerLink]="['/analytics']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <i class="feather icon-home" aria-hidden="true"></i>
        <span>Dashboard</span>
      </a>
      <a class="header-nav-item" [routerLink]="['/users']" routerLinkActive="active">
        <i class="feather icon-users" aria-hidden="true"></i>
        <span>Quản lý Người Dùng</span>
      </a>
      <a class="header-nav-item" [routerLink]="['/moderation']" routerLinkActive="active">
        <i class="feather icon-edit-2" aria-hidden="true"></i>
        <span>Quản lý Nội dung</span>
      </a>
      <a class="header-nav-item" [routerLink]="['/audit-logs']" routerLinkActive="active">
        <i class="feather icon-file-text" aria-hidden="true"></i>
        <span>Nhật ký Hoạt động</span>
      </a>
    </nav>

    <!-- Right Side Items -->
    <div class="header-actions ms-auto d-flex align-items-center">
      <!-- User Menu -->
      <div class="nav-item dropdown user-dropdown">
        <a
          class="nav-link dropdown-toggle user-trigger"
          href="javascript:void(0)"
          role="button"
          (click)="toggleUserMenu(); $event.stopPropagation()"
          [attr.aria-expanded]="isUserMenuOpen"
        >
          <span class="user-avatar" aria-hidden="true">
            <i class="feather icon-user"></i>
          </span>
          <span class="user-name ms-1 d-none d-sm-inline">{{ authHelper.getDisplayName() }}</span>
        </a>
        <div class="dropdown-menu dropdown-menu-end" [class.show]="isUserMenuOpen">
          <div class="dropdown-header">{{ authHelper.getDisplayName() }}</div>
          <button type="button" class="dropdown-item" (click)="logout()">
            <i class="feather icon-log-out me-2"></i>Đăng xuất
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
