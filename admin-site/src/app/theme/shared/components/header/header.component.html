<nav class="navbar pcoded-header navbar-expand-lg navbar-light header-blue headerPos-fixed">
  <div class="container-fluid">
    <!-- Logo Section -->
    <a class="navbar-brand" href="#">
      <i class="feather icon-layers"></i> Admin Panel
    </a>

    <!-- Mobile Toggle -->
    <button
      class="btn btn-link d-lg-none"
      type="button"
      (click)="onToggleMobileSidebar()"
      aria-label="Toggle navigation"
    >
      <i class="feather icon-menu"></i>
    </button>

    <!-- Desktop Toggle -->
    <button
      class="btn btn-link d-none d-lg-block"
      type="button"
      (click)="onToggleSidebar()"
      aria-label="Toggle sidebar"
    >
      <i class="feather icon-menu"></i>
    </button>

    <!-- Right Side Items -->
    <div class="ml-auto d-flex align-items-center">
      <!-- User Menu -->
      <div class="nav-item dropdown">
        <a
          class="nav-link dropdown-toggle"
          href="javascript:void(0)"
          role="button"
          (click)="toggleUserMenu(); $event.stopPropagation()"
          [attr.aria-expanded]="isUserMenuOpen"
        >
          <i class="feather icon-user"></i>
          <span class="ms-1 d-none d-sm-inline">{{ authHelper.getDisplayName() }}</span>
        </a>
        <div class="dropdown-menu dropdown-menu-end" [class.show]="isUserMenuOpen">
          <div class="dropdown-header">{{ authHelper.getDisplayName() }}</div>
          <button type="button" class="dropdown-item" (click)="logout()">
            <i class="feather icon-log-out me-2"></i>Đăng xuất
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
