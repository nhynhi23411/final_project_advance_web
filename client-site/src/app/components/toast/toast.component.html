<div *ngIf="message" role="status" aria-live="polite" aria-atomic="true"
  class="toast-box fixed top-4 right-4 z-[9999] max-w-sm shadow-lg rounded-lg px-4 py-3 text-white flex items-center justify-between gap-4"
  [ngClass]="typeClass">
  <span>{{ message.text }}</span>
  <button type="button" (click)="toastService.dismiss()" aria-label="Đóng"
    class="flex-shrink-0 text-white hover:text-blueGray-200 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-white rounded">
    <i class="fas fa-times" aria-hidden="true"></i>
  </button>
</div>
