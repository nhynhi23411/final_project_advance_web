<div
  *ngIf="message"
  class="toast-box fixed top-4 right-4 z-[9999] max-w-sm shadow-lg rounded-lg px-4 py-3 text-white flex items-center justify-between gap-4"
  [ngClass]="typeClass"
>
  <span>{{ message.text }}</span>
  <button
    type="button"
    (click)="toastService.dismiss()"
    class="flex-shrink-0 text-white hover:text-blueGray-200 transition-colors"
  >
    <i class="fas fa-times"></i>
  </button>
</div>
