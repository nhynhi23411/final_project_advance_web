<div class="rounded-xl p-4 border transition-shadow" style="border-color: #E3E8EE; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
    <input #fileInput type="file" accept="image/*" multiple class="hidden" (change)="onFileSelected($event)" />

    <div *ngIf="images.length === 0" class="flex items-center justify-center gap-3 py-1">
        <button type="button"
            class="btn-uel-primary px-4 py-2 text-xs font-semibold rounded-lg uppercase"
            (click)="$event.stopPropagation(); fileInput.click()">
            Chọn ảnh
        </button>
        <span class="text-xs" style="color: #6b7280">Không ảnh nào được chọn</span>
    </div>

    <div *ngIf="images.length > 0" class="space-y-3">
        <div class="flex items-center justify-between">
            <span class="text-sm font-medium" style="color: #1F2D3D">{{ images.length }}/{{ maxImages }} ảnh</span>
            <button *ngIf="images.length < maxImages" type="button"
                class="btn-uel-primary px-3 py-1.5 text-xs font-semibold rounded-lg uppercase"
                (click)="$event.stopPropagation(); fileInput.click()">
                + Thêm
            </button>
        </div>

        <div class="flex flex-wrap gap-3">
            <div *ngFor="let img of images; let i = index" class="flex flex-col items-center gap-1">
                <div
                    class="relative group rounded-lg overflow-hidden border"
                    style="width: 72px; height: 72px; border-color: #E3E8EE; box-shadow: 0 2px 6px rgba(0,0,0,0.06);"
                >
                    <img *ngIf="img.preview" [src]="img.preview" alt="Preview" class="w-full h-full object-cover" />
                    <div *ngIf="img.uploading"
                        class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                        <i class="fas fa-spinner fa-spin text-white text-sm"></i>
                    </div>
                    <div *ngIf="img.error"
                        class="absolute inset-0 flex items-center justify-center"
                        style="background: rgba(255, 122, 69, 0.7);">
                        <span class="text-white text-xs font-semibold px-1 text-center leading-tight"
                            style="font-size: 9px;">{{ img.error }}</span>
                    </div>
                    <div *ngIf="img.done && !img.error"
                        class="absolute top-0.5 left-0.5 rounded-full w-4 h-4 flex items-center justify-center"
                        style="background: #1EA6BF;">
                        <i class="fas fa-check text-white" style="font-size: 8px;"></i>
                    </div>
                </div>
                <button
                    type="button"
                    class="text-xs font-semibold px-2 py-1 rounded-md"
                    style="background: rgba(255, 122, 69, 0.12); color: #c44a1a;"
                    (click)="$event.stopPropagation(); removeImage(i)"
                >
                    Xóa ảnh
                </button>
            </div>
        </div>
    </div>

    <div *ngIf="sizeError"
        class="mt-2 p-2 rounded-lg text-xs font-semibold flex items-center"
        style="background: rgba(255, 122, 69, 0.1); border: 1px solid rgba(255, 122, 69, 0.3); color: #c44a1a;">
        <i class="fas fa-exclamation-triangle mr-1.5"></i>
        {{ sizeError }}
    </div>

    <p class="text-xs text-center mt-2" style="color: #6b7280">Tối đa {{ maxImages }} ảnh, mỗi ảnh ≤ 5MB</p>
</div>
