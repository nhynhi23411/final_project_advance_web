<div class="border border-blueGray-300 rounded-lg p-3">
    <input #fileInput type="file" accept="image/*" multiple class="hidden" (change)="onFileSelected($event)" />

    <div *ngIf="images.length === 0" class="flex items-center justify-center gap-3 py-1">
        <button type="button"
            class="px-4 py-1.5 text-xs font-bold text-white bg-blueGray-700 active:bg-blueGray-600 rounded shadow hover:shadow-md outline-none focus:outline-none ease-linear transition-all duration-150 uppercase"
            (click)="$event.stopPropagation(); fileInput.click()">
            Chọn ảnh
        </button>
        <span class="text-xs text-blueGray-400">Không ảnh nào được chọn</span>
    </div>

    <div *ngIf="images.length > 0" class="space-y-3">
        <div class="flex items-center justify-between">
            <span class="text-sm text-blueGray-600 font-medium">{{ images.length }}/{{ maxImages }} ảnh</span>
            <button *ngIf="images.length < maxImages" type="button"
                class="px-3 py-1 text-xs font-bold text-white bg-blueGray-700 active:bg-blueGray-600 rounded shadow hover:shadow-md outline-none focus:outline-none ease-linear transition-all duration-150 uppercase"
                (click)="$event.stopPropagation(); fileInput.click()">
                + Thêm
            </button>
        </div>

        <div class="flex flex-wrap gap-2">
            <div *ngFor="let img of images; let i = index"
                class="relative group rounded-md overflow-hidden shadow-sm border border-blueGray-200"
                style="width: 72px; height: 72px;">
                <img *ngIf="img.preview" [src]="img.preview" alt="Preview" class="w-full h-full object-cover" />
                <div *ngIf="img.uploading"
                    class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                    <i class="fas fa-spinner fa-spin text-white text-sm"></i>
                </div>
                <div *ngIf="img.error"
                    class="absolute inset-0 bg-red-500 bg-opacity-60 flex items-center justify-center">
                    <span class="text-white text-xs font-semibold px-1 text-center leading-tight"
                        style="font-size: 9px;">{{ img.error }}</span>
                </div>
                <div *ngIf="img.done && !img.error"
                    class="absolute top-0.5 left-0.5 bg-emerald-500 rounded-full w-4 h-4 flex items-center justify-center">
                    <i class="fas fa-check text-white" style="font-size: 8px;"></i>
                </div>
                <button type="button"
                    class="absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                    (click)="$event.stopPropagation(); removeImage(i)">
                    <i class="fas fa-times" style="font-size: 8px;"></i>
                </button>
            </div>
        </div>
    </div>

    <div *ngIf="sizeError"
        class="mt-2 p-2 bg-red-50 border border-red-300 rounded text-red-600 text-xs font-semibold flex items-center">
        <i class="fas fa-exclamation-triangle mr-1.5"></i>
        {{ sizeError }}
    </div>

    <p class="text-xs text-blueGray-400 text-center mt-2">Tối đa {{ maxImages }} ảnh, mỗi ảnh ≤ 5MB</p>
</div>
