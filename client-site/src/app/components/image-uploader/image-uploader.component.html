<!-- Simple upload area matching Figma style -->
<div class="border rounded-lg p-3 transition-all duration-200" [style.border-color]="dragOver ? '#3B5998' : '#B0BEC5'"
    [class.bg-blue-50]="dragOver" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)">
    <input #fileInput type="file" accept="image/*" multiple class="hidden" (change)="onFileSelected($event)" />

    <!-- No images yet: simple button + text like Figma -->
    <div *ngIf="images.length === 0" class="flex items-center justify-center gap-3 py-1">
        <button type="button"
            class="px-4 py-1.5 text-xs font-semibold text-white rounded transition-colors hover:opacity-90"
            style="background: #3B5998;" (click)="$event.stopPropagation(); fileInput.click()">
            Chọn ảnh
        </button>
        <span class="text-xs text-gray-400">Không ảnh nào được chọn</span>
    </div>

    <!-- Has images: show count + add more -->
    <div *ngIf="images.length > 0" class="space-y-3">
        <div class="flex items-center justify-between">
            <span class="text-sm text-gray-600 font-medium">{{ images.length }}/{{ maxImages }} ảnh</span>
            <button *ngIf="images.length < maxImages" type="button"
                class="px-4 py-1.5 text-xs font-semibold text-white rounded transition-colors hover:opacity-90"
                style="background: #3B5998;" (click)="$event.stopPropagation(); fileInput.click()">
                + Thêm ảnh
            </button>
        </div>

        <!-- Preview Grid -->
        <div class="grid grid-cols-3 sm:grid-cols-5 gap-3">
            <div *ngFor="let img of images; let i = index"
                class="relative group rounded-lg overflow-hidden shadow-sm border"
                style="aspect-ratio: 1 / 1; border-color: #B0BEC5;">
                <!-- Preview image -->
                <img *ngIf="img.preview" [src]="img.preview" alt="Preview" class="w-full h-full object-cover" />

                <!-- Loading overlay -->
                <div *ngIf="img.uploading"
                    class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                    <div class="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </div>

                <!-- Error overlay -->
                <div *ngIf="img.error" class="absolute inset-0 flex items-center justify-center"
                    style="background: rgba(244, 67, 54, 0.6);">
                    <span class="text-white text-xs font-semibold px-1 text-center">{{ img.error }}</span>
                </div>

                <!-- Success check -->
                <div *ngIf="img.done && !img.error"
                    class="absolute top-1 left-1 rounded-full w-5 h-5 flex items-center justify-center"
                    style="background: #4CAF50;">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>

                <!-- Remove button -->
                <button type="button"
                    class="absolute top-1 right-1 text-white rounded-full w-5 h-5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                    style="background: #F44336;" (click)="$event.stopPropagation(); removeImage(i)">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <p class="text-xs text-gray-400 text-center mt-2">Tối đa {{ maxImages }} ảnh, mỗi ảnh ≤ 5MB</p>
</div>
