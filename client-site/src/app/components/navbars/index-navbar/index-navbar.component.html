<nav class="app-nav app-nav-fixed" role="navigation">
  <div class="app-nav-inner">
    <a [routerLink]="['/']" class="app-nav-logo">
      <span class="app-nav-logo-icon">LF</span>
      <span class="app-nav-logo-text">Tìm đồ thất lạc</span>
    </a>
    <button
      type="button"
      class="app-nav-toggle"
      (click)="setNavbarOpen()"
      aria-label="Menu"
      [attr.aria-expanded]="navbarOpen"
    >
      <i class="fas fa-bars"></i>
    </button>
    <div
      class="app-nav-menu"
      [class.is-open]="navbarOpen"
      id="navbar-menu"
    >
      <div class="app-nav-links">
        <a [routerLink]="['/']" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}" class="app-nav-link">Trang chủ</a>
        <a [routerLink]="['/posts']" routerLinkActive="is-active" class="app-nav-link">Bài đăng</a>
        <a *ngIf="authService.isLoggedIn" [routerLink]="['/post-item']" routerLinkActive="is-active" class="app-nav-link">Đăng tin</a>
        <a [routerLink]="['/about']" routerLinkActive="is-active" class="app-nav-link">Về chúng tôi</a>
        <a *ngIf="authService.isLoggedIn" [routerLink]="['/suggestions']" routerLinkActive="is-active" class="app-nav-link">Gợi ý</a>
      </div>
      <div class="app-nav-actions">
        <a *ngIf="!authService.isLoggedIn" [routerLink]="['/auth/login']" class="app-nav-btn app-nav-btn-secondary">Đăng nhập</a>
        <a *ngIf="!authService.isLoggedIn" [routerLink]="['/auth/register']" class="app-nav-btn app-nav-btn-primary">Đăng ký</a>
        <a *ngIf="authService.isLoggedIn" (click)="logout()" class="app-nav-btn app-nav-btn-secondary" role="button">Đăng xuất</a>
      </div>
    </div>
  </div>
</nav>
