<nav class="app-nav" role="navigation">
  <div class="app-nav-inner">
    <a [routerLink]="['/']" class="app-nav-logo">
      <span class="app-nav-logo-icon">LF</span>
      <span class="app-nav-logo-text">Tìm đồ thất lạc</span>
    </a>
    <button
      type="button"
      class="app-nav-toggle"
      (click)="setNavbarOpen()"
      aria-label="Menu"
      [attr.aria-expanded]="navbarOpen"
    >
      <i class="fas fa-bars"></i>
    </button>
    <div
      class="app-nav-menu"
      [class.is-open]="navbarOpen"
      id="navbar-menu"
    >
      <div class="app-nav-links">
        <a [routerLink]="['/']" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}" class="app-nav-link">Trang chủ</a>
        <a [routerLink]="['/posts']" routerLinkActive="is-active" class="app-nav-link">Bài đăng</a>
        <a [routerLink]="['/post-item']" routerLinkActive="is-active" class="app-nav-link">Đăng tin</a>
        <a [routerLink]="['/about']" routerLinkActive="is-active" class="app-nav-link">Về chúng tôi</a>
        <a *ngIf="authService.isLoggedIn" [routerLink]="['/suggestions']" routerLinkActive="is-active" class="app-nav-link">Gợi ý</a>
      </div>
      <div class="app-nav-actions">
        <ng-container *ngIf="!authService.isLoggedIn">
          <a [routerLink]="['/auth/login']" class="app-nav-btn app-nav-btn-secondary">Đăng nhập</a>
          <a [routerLink]="['/auth/register']" class="app-nav-btn app-nav-btn-primary">Đăng ký</a>
        </ng-container>
        <div *ngIf="authService.isLoggedIn" class="app-nav-actions-logged flex items-center gap-2">
          <div class="app-nav-notif-wrap" [class.open]="notifOpen">
            <button type="button" class="app-nav-notif-btn" (click)="toggleNotif()" aria-label="Thông báo">
              <i class="fas fa-bell"></i>
              <span *ngIf="notifCount > 0" class="app-nav-notif-dot">{{ notifCount }}</span>
            </button>
            <div class="app-nav-notif-dropdown" *ngIf="notifOpen">
              <div class="app-nav-notif-title">Thông báo</div>
              <ng-container *ngIf="notifCount > 0">
                <div class="app-nav-notif-item"><i class="fas fa-check-circle text-emerald-500 mr-2"></i> Bài đăng của bạn đã được duyệt</div>
                <div class="app-nav-notif-item"><i class="fas fa-bell text-uel-primary mr-2"></i> Bạn có yêu cầu xác minh mới</div>
              </ng-container>
              <div *ngIf="notifCount === 0" class="app-nav-notif-item text-blueGray-400">Chưa có thông báo mới</div>
            </div>
          </div>
          <div class="app-nav-user-wrap" [class.open]="userMenuOpen">
          <button type="button" class="app-nav-user-btn" (click)="toggleUserMenu()" aria-haspopup="true" [attr.aria-expanded]="userMenuOpen">
            <span class="app-nav-user-avatar"><i class="fas fa-user"></i></span>
            <span class="app-nav-user-name">Tài khoản</span>
            <i class="fas fa-chevron-down app-nav-user-chevron"></i>
          </button>
          <div class="app-nav-user-dropdown" *ngIf="userMenuOpen">
            <a routerLink="/profile" routerLinkActive="app-nav-user-item-active" [routerLinkActiveOptions]="{exact: false}" class="app-nav-user-item" (click)="closeUserMenu()"><i class="fas fa-user" aria-hidden="true"></i><span>Profile</span></a>
            <a routerLink="/profile" class="app-nav-user-item" (click)="closeUserMenu()"><i class="fas fa-list" aria-hidden="true"></i><span>My Posts</span></a>
            <a routerLink="/my-claims" class="app-nav-user-item" (click)="closeUserMenu()"><i class="fas fa-file-contract" aria-hidden="true"></i><span>My Claims</span></a>
            <a routerLink="/archive" class="app-nav-user-item" (click)="closeUserMenu()"><i class="fas fa-archive" aria-hidden="true"></i><span>Archive</span></a>
            <hr class="app-nav-user-divider" />
            <button type="button" class="app-nav-user-item app-nav-user-item-logout" (click)="logout(); closeUserMenu()"><i class="fas fa-sign-out-alt" aria-hidden="true"></i><span>Đăng xuất</span></button>
          </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
