<div class="container mx-auto px-4 h-full">
  <div class="flex content-center items-center justify-center h-full">
    <div class="w-full lg:w-4/12 px-4">
      <div class="card-uel relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg border-0">
        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">
          <div class="uel-section-title text-center mb-6 text-blueGray-700">Quên mật khẩu</div>
          <form (ngSubmit)="submit()">
            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="forgot-email">Email</label>
              <input
                id="forgot-email"
                type="email"
                name="email"
                [(ngModel)]="email"
                autocomplete="email"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="email@example.com"
              />
            </div>

            <div
              *ngIf="errorMessage"
              class="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-lg mb-3 text-sm"
            >
              {{ errorMessage }}
            </div>
            <div
              *ngIf="message"
              class="bg-green-50 border border-green-200 text-green-700 px-4 py-2 rounded-lg mb-3 text-sm"
            >
              {{ message }}
            </div>

            <div class="text-center mt-6">
              <button type="submit" class="btn-uel-primary w-full" [disabled]="loading">
                {{ loading ? "Đang gửi..." : "Gửi link đặt lại mật khẩu" }}
              </button>
            </div>
          </form>
        </div>
      </div>
      <div class="flex flex-wrap mt-6 relative justify-center">
        <a [routerLink]="['/auth/login']" class="text-white opacity-90 hover:opacity-100">
          <small>Quay lại đăng nhập</small>
        </a>
      </div>
    </div>
  </div>
</div>
