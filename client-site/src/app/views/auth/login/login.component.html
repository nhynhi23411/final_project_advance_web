<div class="container mx-auto px-4 h-full">
  <div class="flex content-center items-center justify-center h-full">
    <div class="w-full lg:w-4/12 px-4">
      <div class="card-uel relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg border-0">
        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">
          <div class="uel-section-title text-center mb-6 text-blueGray-700">Đăng nhập</div>
          <form (ngSubmit)="handleLogin()">
            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="login-email">Email</label>
              <input id="login-email" type="email" name="email" [(ngModel)]="email" autocomplete="email"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="email@example.com" />
            </div>

            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="login-password">Mật khẩu</label>
              <div class="relative flex items-center w-full">
                <input id="login-password" [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password" autocomplete="current-password"
                  class="form-control-uel border pl-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full pr-12"
                  style="padding-right: 48px;"
                  placeholder="••••••••" />
                <button type="button" tabindex="-1" (click)="showPassword = !showPassword"
                  class="absolute right-0 top-0 bottom-0 flex items-center justify-center bg-transparent border-0 cursor-pointer focus:outline-none uel-pwd-toggle"
                  style="width: 48px; border-radius: 0 10px 10px 0;"
                  aria-label="Toggle password visibility">
                  <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                  <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="uel-checkbox-wrap inline-flex items-center cursor-pointer">
                <input id="customCheckLogin" type="checkbox" class="uel-checkbox" />
                <span class="uel-checkbox-label">Ghi nhớ đăng nhập</span>
              </label>
            </div>

            <div *ngIf="errorMessage"
              class="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-lg mb-3 text-sm">
              {{ errorMessage }}
            </div>

            <div class="text-center mt-6">
              <button type="submit" class="btn-uel-primary w-full">
                Đăng nhập
              </button>
            </div>
          </form>
        </div>
      </div>
      <div class="login-links flex flex-wrap mt-6 relative">
        <div class="w-1/2">
          <a [routerLink]="['/auth/forgot-password']" class="login-link login-link-muted"><small>Quên mật khẩu?</small></a>
        </div>
        <div class="w-1/2 text-right">
          <a [routerLink]="['/auth/register']" class="login-link login-link-register"><small>Tạo tài khoản mới</small></a>
        </div>
      </div>
    </div>
  </div>
</div>
