<div class="container mx-auto px-4 h-full">
  <div class="flex content-center items-center justify-center h-full">
    <div class="w-full lg:w-6/12 px-4">
      <div class="card-uel relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg border-0">
        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">
          <div class="uel-section-title text-center mb-6 text-blueGray-700">Đăng ký tài khoản</div>
          <form (ngSubmit)="handleRegister()">
            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="reg-name">Họ tên</label>
              <input id="reg-name" type="text" name="name" [(ngModel)]="name" autocomplete="name"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="Nguyễn Văn A" />
            </div>

            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="reg-username">Username</label>
              <input id="reg-username" type="text" name="username" [(ngModel)]="username" autocomplete="username" spellcheck="false"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="nguyenvana" />
            </div>

            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="reg-email">Email</label>
              <input id="reg-email" type="email" name="email" [(ngModel)]="email" autocomplete="email" spellcheck="false"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="email@example.com" />
            </div>

            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="reg-phone">Số điện thoại</label>
              <input id="reg-phone" type="tel" name="phone" [(ngModel)]="phone" autocomplete="tel"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="0901234567" />
            </div>

            <div class="relative w-full mb-3">
              <label class="block text-blueGray-700 text-sm font-bold mb-2" for="reg-password">Mật khẩu</label>
              <input id="reg-password" type="password" name="password" [(ngModel)]="password" autocomplete="new-password"
                class="form-control-uel border px-3 py-3 placeholder-blueGray-400 text-blueGray-700 bg-white w-full"
                placeholder="••••••••" />
            </div>

            <div>
              <label class="uel-checkbox-wrap inline-flex items-center cursor-pointer">
                <input id="customCheckRegister" type="checkbox" name="agree" class="uel-checkbox" />
                <span class="uel-checkbox-label">
                  Tôi đồng ý với <a [routerLink]="['/terms']" class="uel-policy-link" (click)="$event.stopPropagation()">Điều khoản & Chính sách bảo mật</a>
                </span>
              </label>
            </div>

            <div class="text-center mt-6">
              <button type="submit" class="btn-uel-primary w-full">
                Đăng ký
              </button>
            </div>
          </form>
        </div>
      </div>
      <div class="flex flex-wrap mt-6 relative justify-center">
        <a [routerLink]="['/auth/login']" class="text-white opacity-90 hover:opacity-100"><small>Đã có tài khoản? Đăng nhập</small></a>
      </div>
    </div>
  </div>
</div>
