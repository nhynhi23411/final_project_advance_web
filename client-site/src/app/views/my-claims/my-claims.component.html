<div *ngIf="loading" class="prof-loading-inline">
  <i class="fas fa-spinner prof-spinner" aria-hidden="true"></i>
  <span>Đang tải…</span>
</div>

<div *ngIf="!loading && myClaims.length === 0" class="prof-empty prof-empty-tab">
  <i class="fas fa-file-contract prof-empty-icon" aria-hidden="true"></i>
  <p class="prof-empty-text">Bạn chưa gửi yêu cầu xác minh nào.</p>
  <a routerLink="/posts" class="prof-btn prof-btn-primary">
    <i class="fas fa-search" aria-hidden="true"></i>
    Xem bài đăng
  </a>
</div>

<div *ngIf="!loading && myClaims.length > 0">
  <div class="prof-post-list">
    <article *ngFor="let c of myClaims" class="prof-post-card">
      <div class="prof-post-main">
        <h3 class="prof-post-title">
          <a *ngIf="getPostId(c) as postId" [routerLink]="['/items', postId]" class="prof-link">
            {{ getPostTitle(c) }}
          </a>
          <span *ngIf="!getPostId(c)">{{ getPostTitle(c) }}</span>
        </h3>
        
        <div class="prof-post-meta">
          <span class="prof-post-type" [ngClass]="getStatusClass(c.status)">
            {{ getStatusLabel(c.status) }}
          </span>
          <span class="prof-post-date">
            Gửi lúc: {{ formatDate(c.created_at || $any(c).createdAt) }}
          </span>
        </div>
        
        <p *ngIf="c.evidence_text" class="prof-post-location" style="margin-top: 8px;">
          <i class="fas fa-info-circle prof-post-location-icon" aria-hidden="true"></i>
          {{ c.evidence_text }}
        </p>
      </div>

      <div class="prof-post-actions">
        <a *ngIf="getPostId(c) as postId" [routerLink]="['/items', postId]" class="prof-btn prof-btn-ghost">
          <i class="fas fa-eye" aria-hidden="true"></i>
          Xem
        </a>
        <button type="button" class="prof-btn prof-btn-secondary" *ngIf="canCancel(c)" (click)="onCancelClaim(c)">
          <i class="fas fa-times-circle" aria-hidden="true"></i>
          Hủy yêu cầu
        </button>
      </div>
    </article>
  </div>
</div>
